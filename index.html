<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f8f7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16181f" />
  <title>E-Tiket AO Shuttle</title>
  <!-- Set tema sebelum paint supaya tak berkedip (logika sama dengan initTheme di app.js) -->
  <script>
    try {
      var t = localStorage.getItem('aoshuttle_theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  </script>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <!-- Layar login -->
  <main id="login" class="login">
    <form id="login-form" class="login-card" autocomplete="off">
      <img class="login-logo" src="assets/favicon.png" alt="" width="44" height="44" />
      <h1>E-Tiket AO Shuttle</h1>
      <p class="muted">Masukkan password untuk membuka tiket.</p>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <label class="remember">
        <input id="remember" type="checkbox" /> Ingat di perangkat ini
      </label>
      <button type="submit">Buka</button>
      <p id="login-error" class="error" hidden></p>
    </form>
  </main>

  <!-- Aplikasi -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <div class="topbar-left">
        <span id="status" class="status muted"></span>
      </div>
      <div class="topbar-right">
        <label id="datepicker-field" class="datepicker-field" title="Loncat ke tanggal">
          <span class="datepicker-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          <span id="datepicker-label" class="datepicker-label">Loncat ke tanggal</span>
          <input id="datepicker" type="date" aria-label="Loncat ke tanggal" />
        </label>
        <button id="refresh" class="ghost" title="Segarkan: tarik ulang data terbaru" aria-label="Segarkan"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg></button>
        <button id="theme-toggle" class="ghost" title="Ganti tema gelap/terang" aria-label="Ganti tema">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="logout" class="ghost">Keluar</button>
      </div>
    </header>

    <section class="content">
      <h2 class="section-title">Akan datang</h2>
      <div id="return-warning" class="banner-warn" hidden></div>
      <div id="upcoming"></div>
      <p id="empty" class="muted empty" hidden>Belum ada tiket.</p>
    </section>
  </div>

  <!-- Modal detail -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="modal-close" data-close aria-label="Tutup">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Lightbox QR/barcode (perbesar untuk scan) -->
  <div id="lightbox" class="lightbox" hidden>
    <div class="lightbox-backdrop" data-close-lb></div>
    <button id="lightbox-prev" class="lightbox-nav lightbox-prev" data-lb-prev aria-label="Sebelumnya">‹</button>
    <figure class="lightbox-fig">
      <div id="lightbox-card" class="lightbox-card">
        <img id="lightbox-img" class="lightbox-card-qr" alt="QR / Boarding" />
        <figcaption id="lightbox-cap" class="lightbox-card-cap"></figcaption>
      </div>
    </figure>
    <button id="lightbox-next" class="lightbox-nav lightbox-next" data-lb-next aria-label="Berikutnya">›</button>
    <button class="lightbox-close" data-close-lb aria-label="Tutup">×</button>
  </div>

  <!-- Peta posisi shuttle (inline, tanpa buka tab baru) -->
  <div id="mapbox" class="mapbox" hidden>
    <div class="mapbox-backdrop" data-close-map></div>
    <div class="mapbox-card">
      <iframe id="mapbox-frame" class="mapbox-frame" title="Peta posisi shuttle"></iframe>
      <div class="mapbox-bar">
        <span id="mapbox-title" class="kode"></span>
        <button id="mapbox-refresh" title="Segarkan posisi shuttle" aria-label="Segarkan posisi shuttle">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        </button>
        <button class="mapbox-close" data-close-map aria-label="Tutup">×</button>
      </div>
    </div>
  </div>

  <script src="assets/crypto-js.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
